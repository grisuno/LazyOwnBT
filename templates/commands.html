<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Comandos — LazyOwn PurpleTeam</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>
<body>
    <div class="container">
        <h1>Ejecutar Comandos</h1>
        <nav class="topnav">
            <a href="/">Dashboard</a>
            <a href="/alerts">Alertas</a>
            <a href="/events">Eventos</a>
            <a href="/commands">Comandos</a>
            <a href="/api/audit">Auditoría</a>
        </nav>

        <form id="commandForm">
            <div class="row">
                <label for="command">Acción</label>
                <select id="command" name="command" required>
                    {% for cmd in allowed_commands %}
                    <option value="{{ cmd }}">{{ cmd }}</option>
                    {% endfor %}
                </select>
            </div>
            <div id="params-host"></div>
            <button type="submit">Ejecutar</button>
        </form>

        <h3>Resultado</h3>
        <pre id="output" class="pre-scrollable"></pre>
        <p id="error" class="error-msg"></p>
    </div>

    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    <script src="{{ url_for('static', filename='js/commands.js') }}"></script>
</body>
</html>
