<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Alertas — LazyOwn PurpleTeam</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>
<body>
    <div class="container">
        <h1>Alertas</h1>
        <nav class="topnav">
            <a href="/">Dashboard</a>
            <a href="/alerts">Alertas</a>
            <a href="/events">Eventos</a>
            <a href="/commands">Comandos</a>
            <a href="/api/audit">Auditoría</a>
        </nav>
        <input type="search" id="filter" placeholder="Filtrar por tipo, severidad, detalle…">
        <table class="table" id="alertsTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Tipo</th>
                    <th>Detalles</th>
                    <th>Severidad</th>
                    <th>Timestamp</th>
                </tr>
            </thead>
            <tbody>
                {% for alert in alerts %}
                <tr>
                    <td>{{ alert.id }}</td>
                    <td>{{ alert.type }}</td>
                    <td><code>{{ alert.details | tojson }}</code></td>
                    <td><span class="badge sev-{{ alert.severity }}">{{ alert.severity }}</span></td>
                    <td>{{ alert.timestamp }}</td>
                </tr>
                {% else %}
                <tr><td colspan="5" class="empty">Sin alertas registradas.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    <script src="{{ url_for('static', filename='js/table-filter.js') }}"></script>
    <script>tableFilter('alertsTable', 'filter');</script>
</body>
</html>
