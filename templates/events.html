<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Eventos — LazyOwn PurpleTeam</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>
<body>
    <div class="container">
        <h1>Eventos</h1>
        <nav class="topnav">
            <a href="/">Dashboard</a>
            <a href="/alerts">Alertas</a>
            <a href="/events">Eventos</a>
            <a href="/commands">Comandos</a>
            <a href="/api/audit">Auditoría</a>
        </nav>
        <input type="search" id="filter" placeholder="Filtrar por tipo, fuente, descripción…">
        <table class="table" id="eventsTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Tipo</th>
                    <th>Fuente</th>
                    <th>Descripción</th>
                    <th>Timestamp</th>
                </tr>
            </thead>
            <tbody>
                {% for event in events %}
                <tr>
                    <td>{{ event.id }}</td>
                    <td>{{ event.event_type }}</td>
                    <td>{{ event.source }}</td>
                    <td>{{ event.description }}</td>
                    <td>{{ event.timestamp }}</td>
                </tr>
                {% else %}
                <tr><td colspan="5" class="empty">Sin eventos registrados.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    <script src="{{ url_for('static', filename='js/table-filter.js') }}"></script>
    <script>tableFilter('eventsTable', 'filter');</script>
</body>
</html>
